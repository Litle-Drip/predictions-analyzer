<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predara</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #141210;
      --card:    #1d1c18;
      --border:  #2e2c26;
      --text:    #c8c7bc;
      --muted:   #8a8878;
      --orange:  #d94f20;
      --green:   #22c55e;
      --red:     #ef4444;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 32px 100px;
    }

    .app { max-width: 1240px; margin: 0 auto; }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 0;
    }
    .app-logo {
      color: var(--orange);
      font-size: 26px;
      line-height: 1;
    }
    .app-title {
      font-size: 22px;
      font-weight: 500;
      color: #d8d6cc;
      letter-spacing: -0.2px;
    }
    .app-subtitle {
      font-size: 10px;
      color: #9a9888;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ── Search row ── */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .search-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 16px 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #555; }
    .search-row input::placeholder { color: var(--muted); }
    .search-row button {
      background: var(--orange);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      padding: 16px 32px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .search-row button:hover { opacity: 0.85; }

    /* ── Section card ── */
    .mi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    /* ── Event header ── */
    .event-head { padding: 28px 32px 30px; }
    .event-tags {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-size: 11px;
      letter-spacing: 1.2px;
    }
    .tag-platform {
      background: var(--orange);
      color: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    .tag-cat { color: var(--muted); letter-spacing: 1.5px; }
    .tag-status { display: flex; align-items: center; gap: 6px; color: var(--muted); letter-spacing: 1.5px; }
    .dot-green { color: var(--green); }
    .dot-red   { color: var(--red); }
    .dot-muted { color: var(--muted); }
    .event-title {
      font-size: 22px;
      font-weight: 600;
      color: #f2f0e6;
      margin-bottom: 12px;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }
    .event-desc {
      font-size: 13px;
      color: #9a9888;
      line-height: 1.9;
      max-width: 900px;
    }

    /* ── Outcomes section ── */
    .section-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
    }
    .outcome-row {
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
    }
    .outcome-row:last-child { border-bottom: none; }
    .outcome-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .outcome-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .outcome-sub {
      font-size: 12px;
      color: #8a8878;
      margin-top: 4px;
      line-height: 1.6;
    }
    .outcome-right {
      display: flex;
      align-items: baseline;
      gap: 18px;
      flex-shrink: 0;
      margin-left: 24px;
    }
    .outcome-ml {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .outcome-pct {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }
    .bar-wrap {
      height: 6px;
      background: #252420;
      border-radius: 3px;
      margin-top: 14px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px 28px 24px;
    }
    .stat-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #d8d6cc;
      letter-spacing: -0.5px;
    }
    .stat-dash {
      width: 28px;
      height: 2px;
      background: var(--border);
      margin-top: 6px;
    }

    /* ── Timeline / info rows ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 15px 32px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.5;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); }
    .info-val { color: var(--text); text-align: right; max-width: 55%; }

    /* ── Numbered list ── */
    .num-list { padding: 8px 32px 20px; }
    .num-row {
      display: flex;
      gap: 18px;
      padding: 14px 0;
      font-size: 13px;
      line-height: 1.7;
      border-bottom: 1px solid var(--border);
    }
    .num-row:last-child { border-bottom: none; }
    .num-idx {
      color: var(--orange);
      font-size: 10px;
      flex-shrink: 0;
      padding-top: 2px;
      letter-spacing: 0.5px;
      min-width: 20px;
    }
    .num-text { color: var(--text); }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: #9a9888;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer .dot-sm { font-size: 8px; color: var(--orange); }

    /* ── Loading / error ── */
    .mi-loading, .mi-error {
      padding: 48px 32px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 2px;
    }
    .mi-error { color: var(--red); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 28px 16px 72px; }

      .app-header { margin-bottom: 28px; }
      .app-title  { font-size: 18px; }
      .app-subtitle { font-size: 9px; letter-spacing: 1.5px; }

      .search-row { flex-direction: column; }
      .search-row button { width: 100%; text-align: center; }

      .event-head { padding: 20px 18px 22px; }
      .event-title { font-size: 18px; }

      .section-label { padding: 14px 18px 12px; }

      .outcome-row  { padding: 18px 18px 16px; }
      .outcome-pct  { font-size: 34px; }
      .outcome-name { font-size: 14px; }
      .outcome-right { gap: 12px; margin-left: 14px; }

      .stats-grid { grid-template-columns: 1fr; }
      .stat-card  { padding: 16px 18px 18px; }

      .info-row { padding: 12px 18px; flex-wrap: wrap; gap: 4px; }
      .info-val { max-width: 100%; text-align: left; }

      .num-list { padding: 6px 18px 16px; }

      .mi-loading, .mi-error { padding: 32px 18px; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="app-header">
    <div class="app-logo">✦</div>
    <div>
      <div class="app-title">Predara</div>
      <div class="app-subtitle">PREDICTION ANALYZER · PREDARA</div>
    </div>
  </div>

  <div class="search-row">
    <input id="urlInput" placeholder="https://kalshi.com/markets/... or polymarket.com/event/..." />
    <button onclick="analyze()">ANALYZE ↗</button>
  </div>

  <div id="result"></div>

  <div class="footer"><span class="dot-sm">●</span> PREDARA · 2026</div>

</div>

<script src="app.js"></script>
</body>
</html>
