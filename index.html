<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predara</title>
  <meta name="description" content="Prediction market analyzer for Kalshi, Polymarket, Gemini, and Coinbase.">

  <!-- Open Graph -->
  <meta property="og:title" content="Predara">
  <meta property="og:description" content="Prediction market analyzer for Kalshi, Polymarket, Gemini, and Coinbase.">
  <meta property="og:image" content="https://predara.org/og-image.png">
  <meta property="og:url" content="https://predara.org">
  <meta property="og:type" content="website">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Predara">
  <meta name="twitter:description" content="Prediction market analyzer for Kalshi, Polymarket, Gemini, and Coinbase.">
  <meta name="twitter:image" content="https://predara.org/og-image.png">

  <link rel="icon" href="/og-image.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #141210;
      --card:    #1d1c18;
      --border:  #2e2c26;
      --text:    #c8c7bc;
      --muted:   #a09e8c;
      --orange:  #d94f20;
      --green:   #22c55e;
      --red:     #ef4444;
      /* Extended tokens for light/dark parity */
      --text-bright:   #f2f0e6;
      --text-mid:      #d8d6cc;
      --card-hover:    rgba(255,255,255,0.02);
      --bar-bg:        #252420;
      --tag-bg:        rgba(255,255,255,0.04);
      --rule-bg:       rgba(255,255,255,0.03);
      --sim-result-bg: rgba(255,255,255,0.02);
      --tooltip-bg:    #0e0d0b;
    }

    body.light {
      --bg:      #f5f3ee;
      --card:    #ffffff;
      --border:  #dddbd0;
      --text:    #3a3830;
      --muted:   #7a7868;
      --green:   #16a34a;
      --red:     #dc2626;
      --text-bright:   #1a1916;
      --text-mid:      #2a2820;
      --card-hover:    rgba(0,0,0,0.03);
      --bar-bg:        #e8e5dc;
      --tag-bg:        rgba(0,0,0,0.06);
      --rule-bg:       rgba(0,0,0,0.04);
      --sim-result-bg: rgba(0,0,0,0.04);
      --tooltip-bg:    #f0ede4;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 32px 100px;
    }

    .app { max-width: 1240px; margin: 0 auto; }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 0;
    }
    .app-logo {
      color: var(--orange);
      font-size: 26px;
      line-height: 1;
    }
    .app-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: -0.2px;
    }
    .app-subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ── Search row ── */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .search-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 16px 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--orange); }
    .search-row input::placeholder { color: var(--muted); }
    .search-row button {
      background: var(--orange);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      padding: 16px 32px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .search-row button:hover:not(:disabled) { opacity: 0.85; }
    .search-row button:disabled { pointer-events: none; }

    /* ── Section card ── */
    .mi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    /* ── Event header ── */
    .event-head { padding: 28px 32px 32px; }
    .event-tags {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 1.2px;
    }
    .tag-platform {
      background: var(--orange);
      color: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    .tag-cat {
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 1.5px;
      border: 1px solid currentColor;
    }
    .tag-exclusive {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: #f59e0b;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .tag-status { display: flex; align-items: center; gap: 6px; color: var(--muted); letter-spacing: 1.5px; }
    .dot-green { color: var(--green); }
    .dot-red   { color: var(--red); }
    .dot-muted { color: var(--muted); }
    .event-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-bright);
      margin-top: 4px;
      margin-bottom: 14px;
      letter-spacing: -0.2px;
      line-height: 1.3;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .resolution-rule {
      font-size: 12px;
      color: var(--text-mid);
      background: var(--rule-bg);
      border-left: 3px solid var(--orange);
      padding: 10px 16px;
      margin-bottom: 14px;
      line-height: 1.6;
      letter-spacing: 0.2px;
    }
    .event-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.9;
      max-width: 900px;
    }

    /* ── Outcomes section ── */
    .section-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
    }
    .outcome-row {
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .outcome-row:last-child { border-bottom: none; }
    .outcome-row:hover { background: var(--card-hover); }
    .outcome-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .outcome-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .outcome-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.6;
    }
    .outcome-right {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
      margin-left: 24px;
    }
    .outcome-ml {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .outcome-pct {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }
    .outcome-delta {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      align-self: center;
    }
    .est-tag {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
      letter-spacing: 0;
    }
    .delta-up { color: var(--green); }
    .delta-dn { color: var(--red); }
    .outcome-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 0.3px;
    }
    .outcome-meta span { white-space: nowrap; }
    .bar-wrap {
      height: 8px;
      background: var(--bar-bg);
      border-radius: 3px;
      margin-top: 14px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px 28px 24px;
    }
    .stat-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-mid);
      letter-spacing: -0.5px;
    }
    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      letter-spacing: 0.3px;
      line-height: 1.4;
      word-break: break-word;
    }
    .stat-dash {
      width: 28px;
      height: 2px;
      background: var(--border);
      margin-top: 6px;
    }

    /* ── Timeline / info rows ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 15px 32px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.5;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); }
    .info-val { color: var(--text); text-align: right; max-width: 55%; }

    /* ── Numbered list ── */
    .num-list { padding: 8px 32px 20px; }
    .num-row {
      display: flex;
      gap: 18px;
      padding: 14px 0;
      font-size: 13px;
      line-height: 1.7;
      border-bottom: 1px solid var(--border);
    }
    .num-row:last-child { border-bottom: none; }
    .num-idx {
      color: var(--orange);
      font-size: 10px;
      flex-shrink: 0;
      padding-top: 2px;
      letter-spacing: 0.5px;
      min-width: 20px;
    }
    .num-text { color: var(--text); }

    /* ── What's the Bet explainer ── */
    .bet-explainer { border-left: 3px solid var(--orange); }
    .bet-explainer .section-label {
      color: var(--orange);
      font-weight: 700;
    }
    .bet-explainer-body {
      padding: 16px 32px 24px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-bright);
      letter-spacing: 0.1px;
    }

    /* ── Bet simulator ── */
    .bet-sim-card { }
    .bet-sim-body { padding: 20px 32px 24px; }
    .bet-sim-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 18px;
    }
    .bet-sim-label { letter-spacing: 0.2px; }
    .bet-sim-label strong { color: var(--text-bright); }
    .bet-sim-dollar {
      color: var(--orange);
      font-size: 16px;
      font-weight: 600;
    }
    .bet-sim-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      padding: 8px 12px;
      width: 90px;
      outline: none;
      transition: border-color 0.2s;
    }
    .bet-sim-input:focus { border-color: var(--orange); }
    .bet-sim-input::-webkit-inner-spin-button { opacity: 0.3; }
    .bet-sim-results {
      background: var(--sim-result-bg);
      border-radius: 6px;
      padding: 16px 20px;
    }
    .bet-sim-win, .bet-sim-lose {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }
    .bet-sim-win strong { color: var(--text-bright); }
    .bet-sim-lose strong { color: var(--text-bright); }

    /* ── Tooltips ── */
    .tip {
      position: relative;
      cursor: help;
      border-bottom: 1px dotted var(--muted);
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      transform: none;
      background: var(--tooltip-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2px;
      line-height: 1.5;
      padding: 8px 12px;
      white-space: normal;
      width: max-content;
      max-width: 260px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tip:hover::after,
    .tip:focus::after,
    .tip:active::after { opacity: 1; }
    .tip-bottom::after {
      bottom: auto;
      top: calc(100% + 8px);
    }

    /* ── Urgency banner ── */
    .urgency-banner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }
    .urgency-low  { color: var(--muted); }
    .urgency-med  { color: #f59e0b; }
    .urgency-high { color: var(--red); }
    .urgency-text-low  { color: var(--muted); }
    .urgency-text-med  { color: #f59e0b; }
    .urgency-text-high { color: var(--red); font-weight: 600; }

    /* ── Analytics value colors ── */
    .val-green { color: var(--green); }
    .val-amber { color: #f59e0b; }
    .val-red   { color: var(--red); }
    .val-muted { color: var(--muted); }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--card);
      border: 1px solid var(--orange);
      border-radius: 6px;
      color: var(--orange);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 7px 11px;
      margin-left: auto;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--orange); color: var(--bg); }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer .dot-sm { font-size: 8px; color: var(--orange); }

    /* ── Resolved banner ── */
    .resolved-banner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 7px 14px;
      margin-bottom: 16px;
    }
    .resolved-yes {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: var(--green);
    }
    .resolved-no {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: var(--red);
    }

    /* ── Show more ── */
    .show-more-row {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .show-more-btn {
      background: none;
      border: 1px solid var(--orange);
      border-radius: 4px;
      color: var(--orange);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 8px 16px;
      transition: background 0.15s;
    }
    .show-more-btn:hover { background: rgba(217, 79, 32, 0.1); }

    /* ── Loading / error ── */
    .mi-loading, .mi-error {
      padding: 48px 32px;
      font-size: 13px;
      letter-spacing: 2px;
    }
    .mi-loading {
      color: var(--muted);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .mi-error {
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .retry-btn {
      background: none;
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 6px 14px;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .retry-btn:hover { background: rgba(239, 68, 68, 0.1); }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 32px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      line-height: 1.8;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 28px 16px 72px; }

      .app-header { margin-bottom: 28px; }
      .app-title  { font-size: 18px; }
      .app-subtitle { font-size: 9px; letter-spacing: 1.5px; }

      .search-row { flex-direction: column; }
      .search-row button { width: 100%; text-align: center; }

      .event-head { padding: 20px 18px 22px; }
      .event-title { font-size: 18px; }

      .section-label { padding: 14px 18px 12px; }

      .outcome-row  { padding: 18px 18px 16px; }
      .outcome-pct  { font-size: 38px; }
      .outcome-name { font-size: 14px; }
      .outcome-right { gap: 12px; margin-left: 14px; }

      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-card  { padding: 16px 18px 18px; }

      .info-row { padding: 12px 18px; flex-wrap: wrap; gap: 4px; }
      .info-val { max-width: 100%; text-align: left; }

      .num-list { padding: 6px 18px 16px; }

      .bet-explainer-body { padding: 12px 18px 18px; font-size: 13px; }
      .bet-sim-body { padding: 16px 18px 20px; }
      .bet-sim-input-row { font-size: 13px; }
      .bet-sim-input { width: 80px; font-size: 15px; padding: 6px 10px; }

      .mi-loading, .mi-error { padding: 32px 18px; }

    }
  </style>
</head>
<body class="light">

<div class="app">

  <div class="app-header">
    <div class="app-logo">✦</div>
    <div>
      <div class="app-title">Predara</div>
      <div class="app-subtitle">PREDICTION MARKET ANALYZER</div>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
  </div>

  <div class="search-row">
    <input id="urlInput" placeholder="Paste a Kalshi, Polymarket, Gemini, or Coinbase URL..." onkeydown="if(event.key==='Enter')analyze()" />
    <button onclick="analyze()">ANALYZE ↗</button>
  </div>

  <div id="result"><div class="empty-state">Paste a Kalshi, Polymarket, Gemini, or Coinbase market URL above to analyze odds, volume, and trading data.</div></div>

  <div class="footer"><span class="dot-sm">●</span> PREDARA · EDISON LABS LLC · 2026</div>

</div>

<script src="app.js?v=4"></script>
<script>
  (function () {
    // Default is light; only switch to dark if explicitly saved
    if (localStorage.getItem('predara-theme') === 'dark') {
      document.body.classList.remove('light')
      document.getElementById('themeToggle').textContent = '☾'
    }
  })()

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light')
    localStorage.setItem('predara-theme', isLight ? 'light' : 'dark')
    document.getElementById('themeToggle').textContent = isLight ? '☀' : '☾'
  }
</script>
</body>
</html>
